workflows:
  ios-unsigned-build:
    name: iOS Unsigned IPA Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "ios/Modis.xcworkspace"
        XCODE_SCHEME: "Modis"
        APP_NAME: "Modis"
        NO_FLIPPER: 1
      node: v20.19.4
      xcode: latest
      cocoapods: default
    scripts:
      - name: Clean previous builds
        script: |
          echo " Cleaning previous builds..."
          rm -rf ios/Pods ios/Podfile.lock
          rm -rf node_modules
          rm -rf ios/build ios/DerivedData

      - name: Install npm dependencies
        script: |
          echo " Installing npm dependencies..."
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          
          # Try npm ci first, fallback to npm install if fails
          if npm ci --prefer-offline --no-audit 2>/dev/null; then
            echo " npm ci successful"
          else
            echo "⚠️ npm ci failed, falling back to npm install"
            rm -f package-lock.json
            npm install --prefer-offline --no-audit
            echo " npm install successful"
          fi
          
          # Verify CLI installation
          echo " Verifying React Native CLI..."
          if npx react-native --version; then
            echo " React Native CLI working"
          else
            echo " React Native CLI not working"
            exit 1
          fi

      - name: Install CocoaPods dependencies
        script: |
          echo " Installing CocoaPods dependencies..."
          echo "Current directory: $(pwd)"
          echo "Node version: $(node --version)"
          echo "CocoaPods version: $(pod --version)"
          
          cd ios
          echo " iOS directory before pod install:"
          ls -la
          
          echo " Running pod install..."
          pod install --repo-update --verbose
          
          echo " iOS directory after pod install:"
          ls -la
          
          # Verify workspace was created
          if [ ! -d "Modis.xcworkspace" ]; then
            echo " ERROR: Modis.xcworkspace not created!"
            echo " Checking for any .xcworkspace files:"
            find . -name "*.xcworkspace" -type d
            exit 1
          else
            echo " SUCCESS: Modis.xcworkspace created!"
            echo " Workspace contents:"
            ls -la Modis.xcworkspace/
          fi
          cd ..

      - name: Verify workspace exists
        script: |
            echo "Checking workspace..."
            ls -la ios/
            if [ ! -d "ios/Modis.xcworkspace" ]; then
              echo "ERROR: xcworkspace not found!"
              exit 1
            fi
            echo "Workspace found!"

      - name: Build iOS Archive (unsigned)
        script: |
          ls -la ios/
          echo " Building iOS archive without code signing..."
          xcodebuild archive \
            -workspace $XCODE_WORKSPACE \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/$APP_NAME.xcarchive" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM=""
      
      - name: Create unsigned IPA manually
        script: |
          echo " Creating unsigned IPA file..."
          
          mkdir -p "$CM_BUILD_DIR/Payload"
          
          cp -r "$CM_BUILD_DIR/build/ios/archive/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app" "$CM_BUILD_DIR/Payload/"
          
          cd "$CM_BUILD_DIR"
          zip -r "${APP_NAME}_unsigned.ipa" Payload/
          
          mkdir -p "$CM_BUILD_DIR/build/ios/ipa"
          mv "${APP_NAME}_unsigned.ipa" "$CM_BUILD_DIR/build/ios/ipa/"
          
          echo "Unsigned IPA created: ${APP_NAME}_unsigned.ipa"
          
          ls -la "$CM_BUILD_DIR/build/ios/ipa/"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - camt91990@gmail.com
        notify:
          success: true
          failure: true